name: Card Sleeve
options:
  bundleIdPrefix: com.shimondeitel.cardsleeve
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Card Sleeve:
    type: application
    platform: iOS
    sources:
      - path: Card Sleeve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cardsleeve
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Card Sleeve/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Card SleeveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Card SleeveTests
      - path: Card Sleeve.storekit
    dependencies:
      - target: Card Sleeve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cardsleeve.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Card SleeveUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Card SleeveUITests
    dependencies:
      - target: Card Sleeve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cardsleeve.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Card Sleeve:
    build:
      targets:
        Card Sleeve: all
        Card SleeveTests: [test]
        Card SleeveUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Card Sleeve.storekit
    test:
      config: Debug
      storeKitConfiguration: Card Sleeve.storekit
      targets:
        - Card SleeveTests
        - Card SleeveUITests
    archive:
      config: Release
